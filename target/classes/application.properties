spring.application.name=jis-backend
server.port=${PORT:8080}
server.forward-headers-strategy=framework

spring.datasource.url=${DB_URL:jdbc:mariadb://localhost:3306/jis_db}
spring.datasource.username=${DB_USER:jis_user}
spring.datasource.password=${DB_PASSWORD:password123}

spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

spring.jpa.hibernate.ddl-auto=${DDL_AUTO:validate}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDBDialect

app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}

jwt.secret=${JWT_SECRET:change-this-secret-key-at-least-32-characters}
jwt.expiration-hours=${JWT_EXPIRATION_HOURS:8}
jwt.cookie-secure=${JWT_COOKIE_SECURE:false}
jwt.cookie-same-site=${JWT_COOKIE_SAME_SITE:Lax}