spring.application.name=jis-backend
spring.datasource.url=jdbc:mysql://localhost:3306/jis_db
spring.datasource.username=jis_user
spring.datasource.password=password123

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

server.port=8080

jwt.secret=${JWT_SECRET:change-this-secret-key-at-least-32-characters}
jwt.expiration-hours=${JWT_EXPIRATION_HOURS:8}
jwt.cookie-secure=${JWT_COOKIE_SECURE:false}