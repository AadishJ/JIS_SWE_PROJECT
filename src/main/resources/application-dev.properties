# Dev profile: create/update tables automatically (no manual schema required)
# Run with: ./mvnw spring-boot:run -Dspring-boot.run.profiles=dev
# Or: java -jar target/*.jar --spring.profiles.active=dev

spring.jpa.hibernate.ddl-auto=update

# Run seed data after Hibernate creates/updates schema
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always
spring.sql.init.data-locations=classpath:data-dev.sql
